[CommonSettings]
ManifestDependencies=Content/Localization/Game/Game.manifest
SourcePath=Content/Localization/InputKeysLoc
DestinationPath=Content/Localization/InputKeysLoc
ManifestName=InputKeysLoc.manifest
ArchiveName=InputKeysLoc.archive
NativeCulture=en
CulturesToGenerate=en
CulturesToGenerate=es-ES
CulturesToGenerate=en-GB
CulturesToGenerate=es-MX
CulturesToGenerate=pl-PL
CulturesToGenerate=fr-FR
CulturesToGenerate=it-IT
CulturesToGenerate=de-DE
CulturesToGenerate=ja-JP
CulturesToGenerate=ko-KR
CulturesToGenerate=pt-BR
CulturesToGenerate=pt-PT
CulturesToGenerate=ru-RU
